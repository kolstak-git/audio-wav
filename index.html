<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolstak Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;padding:1.5rem;max-width:640px;margin:auto}
.card{border:1px solid #35373b;border-radius:2px;padding:1rem;margin-bottom:1rem}
button{padding:8px 14px;border-radius:2px;border:1px solid #ccc;cursor:pointer;width:100%;}
button.primary{background:#35373b;color:#fff;border:none}
button:disabled{opacity:.4}
canvas{width:100%;height:80px;background:#eee;margin-top:10px}
.drop{border:1px dashed #aaa;padding:20px;text-align:center;cursor:pointer}
.drop.over{background:#f0f0f0}
#enc-info,#dec-info{margin-top:10px;min-height:20px}
#dec-btns{margin-top:10px;display:flex;gap:8px}
.header {font-family: ui-monospace, Consolas, monospace;text-align: center;margin-bottom: 8px;}
.header-kol  {font-weight: 800; font-size: 46px; letter-spacing: 20px; text-shadow:	0 1px 0 rgba(0,0,0,0.4),0 0 12px rgba(255,255,255,0.08);}
.header-sym  { font-weight: 300; font-size: 46px; margin: 0 4px; }
.header-stak { font-weight: 300; font-size: 46px; letter-spacing: 2px; opacity: 0.85; }
.tagline {width:100%;height:25px;line-height:25px;background: #35373b;text-align: center;font-size: 13px;letter-spacing: 3px;text-transform: uppercase;color: #fff;margin-bottom: 20px;}
label,.disp {display: inline-block;vertical-align: top;font-size:14px;height:25px;}
label {width:20%;min-width:20%;text-align:right;}
.disp {width:75%;min-width:75%;text-align:left; padding-left:20px;}
</style>
</head>
<body>
<div class="header">
	<span class="header-kol th">KOL</span><span class="header-sym th">&#x2630;</span><span class="header-stak th"> STAK</span>	
</div>
<div class="tagline th">DEMO</div>
<div class="card">
	<button class="primary" onclick="document.getElementById('wi').click()">Upload WAV {Max 30MB}</button>
	<input id="wi" type="file" accept=".wav,audio/wav" style="display:none" onchange="onWAV(this)">
	<div id="enc-info"></div>
	<canvas id="enc-wv"></canvas>
</div>
<div class="card">
<label>Channels: </label><span class="disp" id="e-channels"></span><br>
<label>Hz: </label><span class="disp" id="e-hz"></span><br>
<label>Bit Depth: </label><span class="disp" id="e-bit"></span><br>
<label>Kbps: </label><span class="disp" id="e-kbps"></span><br>
<label>Frames: </label><span class="disp" id="e-frames"></span>
</div>
<div class="card">
	<div id="dz" class="drop" onclick="document.getElementById('di').click()">
		Drop encrypted codec file here or click
		<input id="di" type="file" accept=".kol,application/octet-stream" style="display:none" onchange="decodeFile(this.files[0])">
	</div>
	<div id="dec-info"></div>
	<canvas id="dec-wv"></canvas>
	<div id="dec-btns"></div>
</div>
<div class="card">
<label>Channels: </label><span class="disp" id="d-channels"></span><br>
<label>Hz: </label><span class="disp" id="d-hz"></span><br>
<label>Bit Depth: </label><span class="disp" id="d-bit"></span><br>
<label>Kbps: </label><span class="disp" id="d-kbps"></span><br>
<label>Frames: </label><span class="disp" id="d-frames"></span>
</div>
<script src="app.js"></script>
</body>
</html>
